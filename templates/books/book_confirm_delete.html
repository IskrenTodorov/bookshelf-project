{% extends 'base.html' %}
{% block title %}Изтриване на книга{% endblock %}
{% block content %}
<div class="alert alert-danger">
    <h3>Сигурен ли си, че искаш да изтриеш „{{ book.title }}"?</h3>
    <p>Това действие е необратимо!</p>
</div>
<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Да, изтрий</button>
    <a href="{% url 'book-detail' book.pk %}" class="btn btn-secondary">Отказ</a>
</form>
{% endblock %}
