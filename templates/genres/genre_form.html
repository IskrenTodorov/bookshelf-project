{% extends 'base.html' %}
{% block title %}{{ action }} жанр{% endblock %}
{% block content %}
<h1>{{ action }} жанр</h1>
<form method="post">
  {% csrf_token %}
  {% for field in form %}
    <div class="mb-3">
      <label class="form-label">{{ field.label }}</label>
      {{ field }}
      {% for error in field.errors %}<div class="text-danger">{{ error }}</div>{% endfor %}
    </div>
  {% endfor %}
  <button type="submit" class="btn btn-primary">{{ action }}</button>
  <a href="{% url 'genre-list' %}" class="btn btn-secondary">Отказ</a>
</form>
{% endblock %}
