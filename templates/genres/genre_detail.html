{% extends 'base.html' %}
{% block title %}{{ genre.name }}{% endblock %}
{% block content %}
<h1>{{ genre.name }}</h1>
<p>{{ genre.description }}</p>
<h3>Книги в този жанр</h3>
{% for book in genre.books.all %}
  <div class="card mb-2"><div class="card-body">
    <h5>{{ book.title }}</h5>
    <a href="{% url 'book-detail' book.pk %}" class="btn btn-sm btn-outline-primary">Детайли</a>
  </div></div>
{% empty %}<p>Няма книги в този жанр.</p>
{% endfor %}
<a href="{% url 'genre-list' %}" class="btn btn-secondary mt-3">← Назад</a>
{% endblock %}
