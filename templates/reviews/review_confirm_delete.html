{% extends 'base.html' %}
{% block title %}Изтриване на рецензия{% endblock %}
{% block content %}
<div class="alert alert-danger">
  <h3>Изтриване на рецензията</h3>
  <p>Сигурен ли си?</p>
</div>
<form method="post">
  {% csrf_token %}
  {% for field in form %}
    <div class="mb-3">
      <label class="form-label">{{ field.label }}</label>
      {{ field }}
    </div>
  {% endfor %}
  <button type="submit" class="btn btn-danger">Да, изтрий</button>
  <a href="javascript:history.back()" class="btn btn-secondary">Отказ</a>
</form>
{% endblock %}
